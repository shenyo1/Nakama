[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
# Live tests under tests/live/ hit real upstream providers; skip in regular CI.
# Run them explicitly with: pytest tests/live/ -v --override-ini="addopts="
addopts = -ra --ignore=tests/live

# Mark tests that need live network (excluded from CI)
markers =
    network: tests that require live internet access
