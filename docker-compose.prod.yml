# Production compose for this VPS.
# Secrets live in .env.production (mode 600, not committed).
# API on localhost:8000, frontend on localhost:3000. Nginx terminates TLS.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nakama-api:latest
    container_name: nakama-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OFFLINE_MODE: ${OFFLINE_MODE:-0}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-20}
      RATE_LIMIT: ${RATE_LIMIT:-60/minute}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite+aiosqlite:////data/nakamadb.sqlite
      API_KEY: ${API_KEY}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-}
      KIRYUU_BASE_URL: ${KIRYUU_BASE_URL:-https://v7.kiryuu.to}
      KOMIKCAST_API_BASE: ${KOMIKCAST_API_BASE:-https://be.komikcast.cc}
      KOMIKCAST_BASE_URL: ${KOMIKCAST_BASE_URL:-https://v3.komikcast.fit}
      KOMIKCAST_TOKEN: ${KOMIKCAST_TOKEN:-}
      SAKURANOVEL_BASE_URL: ${SAKURANOVEL_BASE_URL:-https://sakuranovel.id}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Public origin only — baked into client for WS URL. No secrets.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://mynakama.web.id}
    image: nakama-frontend:latest
    container_name: nakama-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Server-only (Server Components + /api/backend BFF)
      API_KEY: ${API_KEY}
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://mynakama.web.id}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nakama-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
