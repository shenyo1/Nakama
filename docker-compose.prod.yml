# Production compose for this VPS.
# Secrets live in .env.production (mode 600, not committed).
# API on localhost:8000, frontend on localhost:3000. Nginx terminates TLS.

services:
  db:
    image: postgres:16-alpine
    container_name: nakama-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nakama}
      POSTGRES_USER: ${POSTGRES_USER:-nakama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nakama_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # keep private to compose network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nakama} -d ${POSTGRES_DB:-nakama}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 384m

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nakama-api:latest
    container_name: nakama-api
    # 2 workers share Redis-backed health counters (Tier 3).
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "${UVICORN_WORKERS:-2}",
      ]
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OFFLINE_MODE: ${OFFLINE_MODE:-0}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-20}
      RATE_LIMIT: ${RATE_LIMIT:-60/minute}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nakama:nakama_change_me@db:5432/nakama}
      API_KEY: ${API_KEY}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-}
      KIRYUU_BASE_URL: ${KIRYUU_BASE_URL:-https://v7.kiryuu.to}
      KOMIKCAST_API_BASE: ${KOMIKCAST_API_BASE:-https://be.komikcast.cc}
      KOMIKCAST_BASE_URL: ${KOMIKCAST_BASE_URL:-https://v3.komikcast.fit}
      KOMIKCAST_TOKEN: ${KOMIKCAST_TOKEN:-}
      SAKURANOVEL_BASE_URL: ${SAKURANOVEL_BASE_URL:-https://sakuranovel.id}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      WEB_CONCURRENCY: ${UVICORN_WORKERS:-2}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Public origin only — baked into client for WS URL. No secrets.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://mynakama.web.id}
    image: nakama-frontend:latest
    container_name: nakama-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Server-only (Server Components + /api/backend BFF)
      API_KEY: ${API_KEY}
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://mynakama.web.id}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nakama-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 160m

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: nakama-flaresolverr
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Internal only — no port mapping needed; API container reaches it via
    # http://flaresolverr:8191 on the compose network.
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8191', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
  postgres-data:
