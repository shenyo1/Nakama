# Frontend deploy — Cloudflare Pages
# Triggers on push to main when frontend/** changes. Builds Next.js with
# @cloudflare/next-on-pages adapter and deploys via Wrangler.

name: frontend-deploy-cf-pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm 9 (avoid 11 oddities) and clean registry
        run: |
          npm install -g npm@9
          echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build for Cloudflare Pages (next-on-pages)
        run: npx @cloudflare/next-on-pages@latest
        env:
          NEXT_PUBLIC_API_BASE: https://mynakama.web.id

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_PAGES_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: nakama-frontend
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Optional: trigger a production deploy by default.
          # Set to "preview" if you want a unique URL per PR.
          deploymentEnvironment: production