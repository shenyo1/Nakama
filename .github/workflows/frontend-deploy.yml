# Frontend deploy — Cloudflare Pages
# Triggers on push to main when frontend/** changes. Builds Next.js with
# @cloudflare/next-on-pages adapter and deploys via Wrangler.

name: frontend-deploy-cf-pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm 9 (avoid 11 oddities) and clean registry
        run: |
          npm install -g npm@9
          echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install deps
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://mynakama.web.id

      - name: Build for Cloudflare Pages (next-on-pages)
        run: npx --yes @cloudflare/next-on-pages@1.13.7
        env:
          NEXT_PUBLIC_API_BASE: https://mynakama.web.id

      - name: Patch root route (index.html → SSR function)
        run: |
          WORKER=.vercel/output/static/_worker.js/index.js
          python3 -c "
          import sys
          c = open('$WORKER').read()
          old = '\"/\":{type:\"override\",path:\"/_next/static/not-found.txt\",headers:{\"content-type\":\"text/plain\"}}'
          new = '\"/\":{type:\"function\",entrypoint:\"__next-on-pages-dist__/functions/index.func.js\"}'
          if old in c:
              c = c.replace(old, new)
              open('$WORKER','w').write(c)
              print('Root route patched: override → function')
          else:
              print('Root route already patched or different format')
          "

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy .vercel/output/static \
            --project-name=nakama-frontend \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}