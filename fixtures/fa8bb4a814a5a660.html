<html lang="en"><head>
  <meta charset="UTF-8">
  <title>404 Not Found</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    h1 {
      font-size: 72px;
      margin: 0;
      color: #333;
    }
    p {
      color: #666;
      font-size: 16px;
      margin: 15px 0;
    }
    .countdown {
      font-size: 24px;
      color: #007AFF;
      font-weight: bold;
      margin: 10px 0 30px;
    }
    a.button {
      background-color: #007AFF;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      display: inline-block;
    }
    a.button:hover {
      background-color: #005BBB;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>Halaman tidak ditemukan.</p>
    <p>Anda akan diarahkan dalam <span class="countdown" id="count">4</span> detik.</p>
    <a href="/" class="button">Kembali Sekarang</a>
  </div>

  <script>
    let timeLeft = 5;
    const countSpan = document.getElementById("count");

    const countdown = setInterval(() => {
      timeLeft--;
      countSpan.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        window.location.href = "/";
      }
    }, 1000);
  </script>
<script type="text/javascript" src="https://komiku.org/.well-known/ddos-guard/check" async="" defer=""></script>



</body></html>
