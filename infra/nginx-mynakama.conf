# Nakama reverse proxy
# API:   mynakama.web.id / api.mynakama.web.id / www.mynakama.web.id → 127.0.0.1:8000
# Web:   app.mynakama.web.id → 127.0.0.1:3000

upstream nakama_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream nakama_web {
    server 127.0.0.1:3000;
    keepalive 8;
}

# ---- API (HTTP) ----
server {
    listen 80;
    listen [::]:80;
    server_name mynakama.web.id www.mynakama.web.id api.mynakama.web.id;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://nakama_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# ---- API (HTTPS origin for Cloudflare Full Strict) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mynakama.web.id www.mynakama.web.id api.mynakama.web.id;

    ssl_certificate     /etc/nginx/ssl/mynakama-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/mynakama-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    location / {
        proxy_pass http://nakama_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# ---- Frontend demo (HTTP) ----
server {
    listen 80;
    listen [::]:80;
    server_name app.mynakama.web.id;

    client_max_body_size 10m;

    location / {
        proxy_pass http://nakama_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# ---- Frontend demo (HTTPS origin) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.mynakama.web.id;

    ssl_certificate     /etc/nginx/ssl/mynakama-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/mynakama-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    location / {
        proxy_pass http://nakama_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
