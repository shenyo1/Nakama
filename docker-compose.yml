version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OFFLINE_MODE=0
      - CACHE_TTL_SECONDS=900
      - REQUEST_TIMEOUT=20
      - REDIS_URL=redis://redis:6379/0
      # Uncomment to require API key auth:
      # - API_KEY=your-secret-key-here
      # - RATE_LIMIT=60/minute
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
